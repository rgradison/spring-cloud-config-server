spring:
  config:
    import: optional:configserver:http://localhost:8888
  application:
    name: task-tracking
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 2000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: create-drop   # Drop schema after tests
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration  # If using Flyway for migrations