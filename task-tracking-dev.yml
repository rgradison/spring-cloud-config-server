spring:
  application:
    name: task-tracking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tasktracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20  # Kebab naming
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 2000
      connection-timeout: 30000
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

task:
  feature-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,env,configprops,info,prometheus,refresh
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    enable:
      jvm: true
    tags:
      application: task-tracking

logging:
  level:
    com:
      omnipotent:
        task_tracking: DEBUG