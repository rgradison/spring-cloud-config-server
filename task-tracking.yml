spring:
  application:
    name: task-tracking

  # default datasource (fallback)
  datasource:
    url: jdbc:postgresql://localhost:5432/tasktracker
    username: postgres
    password: admin
    driverClassName: org.postgresql.Driver
    hikari:
      maximumPoolSize: 20
      minimumIdle: 10
      idleTimeout: 600000
      maxLifetime: 1800000
      leakDetectionThreshold: 2000
      connectionTimeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: task-tracking

logging:
  level:
    com:
      omnipotent:
        task_tracking: INFO